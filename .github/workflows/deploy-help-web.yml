name: Deploy Help Web

on:
  push:
    branches: [main, dev]
    paths:
      - 'docs/**'
      - 'help-web/**'
      - 'assets/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'docs/**'
      - 'help-web/**'
      - 'assets/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: help-web/package-lock.json

      - name: Install dependencies
        run: |
          cd help-web
          npm ci

      - name: Build content and search index
        run: |
          cd help-web
          npm run build:content
          npm run build:search

      - name: Build production bundle
        run: |
          cd help-web
          npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: help-web-dist
          path: help-web/dist/
          retention-days: 7

      - name: Deploy to OVH Development Server
        if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.FTP_SERVER }}
          REMOTE_USER: ${{ secrets.FTP_USERNAME }}
          SOURCE: "help-web/dist/"
          TARGET: "/spotto-help-dev/"
          EXCLUDE: "/node_modules/"

      - name: Deploy to OVH Production Server
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY_PROD }}
          REMOTE_HOST: ${{ secrets.FTP_SERVER_PROD }}
          REMOTE_USER: ${{ secrets.FTP_USERNAME_PROD }}
          SOURCE: "help-web/dist/"
          TARGET: "/spotto-help/"
          EXCLUDE: "/node_modules/"
