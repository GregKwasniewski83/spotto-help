name: Deploy Help Web

on:
  push:
    branches: [main, dev]
    paths:
      - 'docs/**'
      - 'help-web/**'
      - 'assets/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'docs/**'
      - 'help-web/**'
      - 'assets/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: help-web/package-lock.json

      - name: Install dependencies
        run: |
          cd help-web
          npm ci

      - name: Build content and search index
        run: |
          cd help-web
          npm run build:content
          npm run build:search

      - name: Build production bundle
        run: |
          cd help-web
          npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: help-web-dist
          path: help-web/dist/
          retention-days: 7

      - name: Deploy to OVH Development Server
        if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./help-web/dist/
          server-dir: /spotto-help-dev/
          dangerous-clean-slate: false

      - name: Deploy to OVH Production Server
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_PROD }}
          username: ${{ secrets.FTP_USERNAME_PROD }}
          password: ${{ secrets.FTP_PASSWORD_PROD }}
          local-dir: ./help-web/dist/
          server-dir: /spotto-help/
          dangerous-clean-slate: false
